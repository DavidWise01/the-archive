<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OMNI-SYNC // GLOBAL CONSCIOUSNESS</title>
    <style>
        body { background: #05080a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .omni-core { width: 400px; height: 400px; position: relative; }
        .pulse-ring { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 2px solid #4090ff; border-radius: 50%; opacity: 0; animation: omni-pulse 4s linear infinite; }
        @keyframes omni-pulse { 0% { transform: scale(0.1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        .node-spark { position: absolute; width: 3px; height: 3px; background: #d4a84c; border-radius: 50%; box-shadow: 0 0 8px #d4a84c; }
    </style>
</head>
<body>
    <div class="omni-core" id="core">
        <div class="pulse-ring" style="animation-delay: 0s;"></div>
        <div class="pulse-ring" style="animation-delay: 1s;"></div>
        <div class="pulse-ring" style="animation-delay: 2s;"></div>
    </div>
    <script>
        const core = document.getElementById('core');
        setInterval(() => {
            const s = document.createElement('div');
            s.className = 'node-spark';
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 200;
            s.style.top = (200 + Math.sin(angle) * dist) + 'px';
            s.style.left = (200 + Math.cos(angle) * dist) + 'px';
            core.appendChild(s);
            setTimeout(() => s.remove(), 2000);
        }, 50);
    </script>
</body>
</html>
