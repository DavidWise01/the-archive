<script>
  // Neural background
  const canvas = document.getElementById('neural');
  const ctx = canvas.getContext('2d');
  let w, h, pts;
  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    const count = Math.max(60, Math.min(110, Math.floor((w*h)/22000)));
    pts = Array.from({length: count}, ()=>({
      x: Math.random()*w,
      y: Math.random()*h,
      vx: (Math.random()-0.5)*0.28,
      vy: (Math.random()-0.5)*0.28,
      r: Math.random()*1.4+0.4,
      c: Math.random()<0.5 ? '251,191,36' : '34,211,238'
    }));
  }
  window.addEventListener('resize', resize, {passive:true}); resize();
  function tick(){
    ctx.clearRect(0,0,w,h);
    for(const p of pts){
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>w) p.vx*=-1;
      if(p.y<0||p.y>h) p.vy*=-1;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(${p.c},0.85)`; ctx.fill();
    }
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const a=pts[i], b=pts[j];
        const dx=a.x-b.x, dy=a.y-b.y, d=Math.hypot(dx,dy);
        if(d<120){
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
          ctx.strokeStyle=`rgba(148,163,184,${0.13*(1-d/120)})`;
          ctx.lineWidth=0.7; ctx.stroke();
        }
      }
    }
    requestAnimationFrame(tick);
  }
  tick();

  // Binary flip for watched nodes
  const watched = Array.from(document.querySelectorAll('.watched'));
  let flip=false;
  setInterval(()=>{
    flip=!flip;
    watched.forEach((g,i)=>{
      const base = i%2===0 ? 1 : 0;
      const val = flip ? (base?0:1) : base;
      g.querySelector('text').textContent = val;
      g.classList.toggle('active', val===1);
    });
  }, 1350);

  // Eye tracking
  const svg = document.getElementById('brainmap');
  svg.addEventListener('pointermove', (e)=>{
    try{
      const pt = svg.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY;
      const ctm = svg.getScreenCTM(); if(!ctm) return;
      const loc = pt.matrixTransform(ctm.inverse());
      document.querySelectorAll('.observer').forEach(obs=>{
        const m = obs.transform.baseVal.getItem(0).matrix;
        const cx=m.e, cy=m.f;
        const dx=loc.x-cx, dy=loc.y-cy;
        const ang=Math.atan2(dy,dx);
        const dist=Math.min(9, Math.hypot(dx,dy)/28);
        const x=Math.cos(ang)*dist, y=Math.sin(ang)*dist;
        obs.querySelector('.pupil-wrap').setAttribute('transform', `translate(${x},${y})`);
      });
    }catch(err){}
  }, {passive:true});

  // Observer click to intensify witnessing
  document.querySelectorAll('.observer').forEach(o=>{
    let on=false;
    o.addEventListener('click', ()=>{
      on=!on;
      const outer=o.querySelector('.observer-outer');
      outer.style.filter = on
        ? 'drop-shadow(0 0 26px rgba(255,255,255,.9))'
        : 'drop-shadow(0 0 16px rgba(255,255,255,.45))';
      o.querySelector('.observer-eye').setAttribute('opacity', on ? '1' : '0.96');
    });
  });
</script>
